<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>اتجاه القبلة الحية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2 family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0B1D26;
    --surface:#15303A;
    --surface-2:#1D3B45;
    --gold:#C9A24B;
    --gold-soft:#E2C77E;
    --parchment:#F4ECD8;
    --sage:#5A8F7B;
    --danger:#B5654A;
    --line: rgba(244,236,216,0.12);
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(120% 90% at 50% -10%, #11313c 0%, var(--bg-deep) 55%, #081318 100%);
    color:var(--parchment);
    font-family:'Tajawal', sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing: antialiased;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: max(18px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
  }

  .stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(244,236,216,0.35) 0, transparent 50%),
      radial-gradient(1px 1px at 80% 15%, rgba(244,236,216,0.25) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(244,236,216,0.3) 0, transparent 50%),
      radial-gradient(1px 1px at 30% 80%, rgba(244,236,216,0.2) 0, transparent 50%);
    background-size: 100% 100%;
    opacity:.8;
  }

  header{
    position:relative; z-index:1;
    width:100%; max-width:480px;
    text-align:center;
    padding-top:6px;
    margin-bottom: 6px;
  }

  .brand-eyebrow{
    font-family:'Amiri', serif;
    font-size:13px;
    color: var(--gold-soft);
    opacity:.85;
    margin-bottom:2px;
  }

  .brand-name{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:26px;
    color: var(--parchment);
    margin:0;
  }

  .brand-name .accent{ color: var(--gold-soft); }

  main{
    position:relative; z-index:1;
    width:100%; max-width:420px;
    display:flex; flex-direction:column; align-items:center;
    flex:1;
    justify-content:center;
    gap:22px;
  }

  #gate{
    width:100%;
    background: linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid var(--line);
    border-radius:20px;
    padding:28px 22px;
    text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    border:none;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color:#1A1106;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    box-shadow: 0 8px 20px rgba(201,162,75,0.25);
  }

  .btn.secondary{
    background: transparent;
    border:1px solid var(--line);
    color: var(--parchment);
    box-shadow:none;
    margin-top:10px;
  }

  #status-line{
    font-size:13px;
    color: var(--gold-soft);
    margin-top:14px;
    min-height:16px;
    line-height: 1.5;
  }
  #status-line.error { color: var(--danger); }

  #compass-wrap{
    display:none;
    width:100%;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }

  .compass-dial{
    position:relative;
    width: min(78vw, 300px);
    height: min(78vw, 300px);
    border-radius:50%;
    background: linear-gradient(180deg, var(--surface), #0F242C);
    border:1px solid var(--line);
    box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    display:flex; align-items:center; justify-content:center;
  }

  .dial-ticks{ position:absolute; inset:0; }
  .tick{
    position:absolute; top:6px; left:50%; width:1.5px; height:10px;
    background: rgba(244,236,216,0.25);
    transform-origin: 50% min(39vw, 150px);
  }
  .tick.major{ height:16px; width:2px; background: rgba(244,236,216,0.45); }

  .directions-ring { position: absolute; inset: 0; pointer-events: none; }
  .dir-label{ position:absolute; font-size:14px; font-weight:700; color: rgba(244,236,216,0.55); }
  .dir-label.N{ top:18px; left:50%; transform:translateX(-50%); color: var(--gold-soft); }
  .dir-label.E{ top:50%; right:18px; transform:translateY(-50%); }
  .dir-label.S{ bottom:18px; left:50%; transform:translateX(-50%); }
  .dir-label.W{ top:50%; left:18px; transform:translateY(-50%); }

  .kaaba-center {
    position: absolute;
    width: 44px; height: 44px; z-index: 1;
    background: #111; border: 2px solid var(--gold); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .kaaba-center::before {
    content: ''; position: absolute; top: 8px; left: 0; right: 0; height: 5px; background: var(--gold);
  }

  #needle-wrap {
    position: absolute;
    width: 100%; height: 100%; z-index: 2;
    transform: rotate(0deg);
    transition: transform .1s ease-out;
  }

  #needle{
    position: absolute; top: 12%; left: 50%; width: 34px; height: 45px;
    transform: translateX(-50%);
    filter: drop-shadow(0 4px 8px rgba(201,162,75,0.4));
  }
  #needle svg{ width:100%; height:100%; display:block; }

  #readout{ width:100%; display:flex; justify-content:space-between; gap:10px; }
  .stat{ flex:1; background: var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 10px; text-align:center; }
  .stat .label{ font-size:11.5px; color: rgba(244,236,216,0.5); margin-bottom:4px; }
  .stat .value{ font-weight:900; font-size:18px; color: var(--gold-soft); direction:ltr; }

  #aligned-banner{
    display:none; width:100%; text-align:center;
    background: linear-gradient(180deg, rgba(90,143,123,0.18), rgba(90,143,123,0.06));
    border:1px solid rgba(90,143,123,0.4); color: var(--sage);
    border-radius:14px; padding:10px 12px; font-weight:700; font-size:14px;
  }

  footer{ text-align:center; font-size:11.5px; color: rgba(244,236,216,0.35); margin-top:18px; }
</style>
</head>
<body>

<div class="stars"></div>
<header>
  <div class="brand-eyebrow">من إعداد بوت</div>
  <h1 class="brand-name"><span class="accent">[اسم البوت]</span></h1>
</header>

<main>
  <div id="gate">
    <h2>تفعيل بوصلة القبلة الحية</h2>
    <p>تطلب هذه الصفحة الوصول إلى الـ GPS وحساس التوجيه الفعلي لتحديد الاتجاه الآن تلقائياً.</p>
    <button class="btn" id="start-btn">ابدأ تحديد الاتجاه</button>
    <div id="status-line"></div>
  </div>

  <div id="compass-wrap">
    <div class="compass-dial" id="dial">
      <div class="dial-ticks" id="ticks"></div>
      <div class="directions-ring">
        <span class="dir-label N">شمال</span>
        <span class="dir-label E">شرق</span>
        <span class="dir-label S">جنوب</span>
        <span class="dir-label W">غرب</span>
      </div>
      <div class="kaaba-center"></div>
      <div id="needle-wrap">
        <div id="needle">
          <svg viewBox="0 0 34 45" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 0L34 35L17 28L0 35L17 0Z" fill="#C9A24B"/>
            <path d="M17 0L17 28L0 35L17 0Z" fill="#E2C77E" opacity="0.7"/>
          </svg>
        </div>
      </div>
    </div>

    <div id="aligned-banner">📍 اتجاهك صحيح نحو القبلة الآن</div>
    <div id="readout">
      <div class="stat">
        <div class="label">زاوية القبلة</div>
        <div class="value" id="qibla-deg">--°</div>
      </div>
      <div class="stat">
        <div class="label">المسافة لمكة</div>
        <div class="value" id="distance">-- كم</div>
      </div>
    </div>
    <button class="btn secondary" id="recalibrate-btn">إعادة ضبط</button>
  </div>
</main>

<script>
(function(){
  const KAABA_LAT = 21.4225;
  const KAABA_LNG = 39.8262;

  const gate = document.getElementById('gate');
  const compassWrap = document.getElementById('compass-wrap');
  const startBtn = document.getElementById('start-btn');
  const recalBtn = document.getElementById('recalibrate-btn');
  const statusLine = document.getElementById('status-line');
  const needleWrap = document.getElementById('needle-wrap');
  const qiblaDegEl = document.getElementById('qibla-deg');
  const distanceEl = document.getElementById('distance');
  const alignedBanner = document.getElementById('aligned-banner');
  const ticksContainer = document.getElementById('ticks');

  let qiblaBearing = null;

  // بناء التدريج
  for (let i = 0; i < 36; i++) {
    const tick = document.createElement('div');
    tick.className = 'tick' + (i % 9 === 0 ? ' major' : '');
    tick.style.transform = `rotate(${i * 10}deg)`;
    ticksContainer.appendChild(tick);
  }

  function toRad(d){ return d * Math.PI / 180; }
  function toDeg(r){ return r * 180 / Math.PI; }

  function computeQibla(lat, lng){
    const phiK = toRad(KAABA_LAT);
    const lambdaK = toRad(KAABA_LNG);
    const phi = toRad(lat);
    const lambda = toRad(lng);
    const psi = Math.atan2(
      Math.sin(lambdaK - lambda),
      Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda)
    );
    return (toDeg(psi) + 360) % 360;
  }

  function computeDistance(lat, lng){
    const R = 6371;
    const dLat = toRad(KAABA_LAT - lat);
    const dLng = toRad(KAABA_LNG - lng);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat)) * Math.cos(toRad(KAABA_LAT)) * Math.sin(dLng/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }

  function updateCompass(heading){
    if (qiblaBearing === null) return;
    // لف السهم بناء على دوران الهاتف الحقيقي وثبات اللوحة خلفه
    let targetRotation = (qiblaBearing - heading + 360) % 360;
    needleWrap.style.transform = `rotate(${targetRotation}deg)`;

    let diff = Math.abs(((targetRotation % 360) + 540) % 360 - 180);
    alignedBanner.style.display = (diff < 6) ? 'block' : 'none';
  }

  function handleOrientation(e){
    let heading = null;
    if (e.webkitCompassHeading !== undefined) {
      heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      // تعديل لأجهزة أندرويد لتعويض الحركة الحية المطلقة
      heading = e.absolute ? (360 - e.alpha) : (360 - e.alpha); 
    }
    if (heading !== null) {
      updateCompass(heading);
    }
  }

  function activateSensors(){
    // للأندرويد: استخدام الاستماع المطلق أولاً لضمان عدم التعليق
    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    } else if ('ondeviceorientation' in window) {
      window.addEventListener('deviceorientation', handleOrientation, true);
    } else {
      statusLine.textContent = "جهازك لا يمتلك حساس بوصلة مدمج.";
    }
  }

  function init(){
    statusLine.textContent = 'جاري تحديد موقعك GPS والتحقق من الحساسات...';
    if (!navigator.geolocation) {
      statusLine.textContent = 'المتصفح لا يدعم تحديد الموقع الحقيقي.';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        qiblaBearing = computeQibla(latitude, longitude);
        
        qiblaDegEl.innerHTML = Math.round(qiblaBearing) + '<small>°</small>';
        distanceEl.innerHTML = computeDistance(latitude, longitude).toLocaleString() + '<small> كم</small>';

        gate.style.display = 'none';
        compassWrap.style.display = 'flex';
        
        // تشغيل الحساسات فوراً بعد الإذن بالـ GPS
        activateSensors();
      },
      (err) => {
        statusLine.className = 'error';
        statusLine.textContent = 'تنبيه: يجب السماح للمتصفح بالوصول للموقع (GPS) وتفعيله في الهاتف لكي تتحرك البوصلة.';
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  startBtn.addEventListener('click', init);
  recalBtn.addEventListener('click', () => {
    compassWrap.style.display = 'none';
    gate.style.display = 'block';
    statusLine.textContent = '';
  });
})();
</script>
</body>
</html>
